services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: custody
      POSTGRES_USER: custody
      POSTGRES_PASSWORD: custody
    ports:
      - "5432:5432"
    volumes:
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U custody -d custody"]
      interval: 5s
      timeout: 3s
      retries: 20

  custody-api:
    image: node:22
    working_dir: /app
    volumes:
      - ../../:/app
    command: bash -lc "cd src/custody-api && npm install && npm run dev"
    env_file:
      - ../../src/custody-api/.env.compose
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  guildbot:
    image: node:22
    working_dir: /app
    volumes:
      - ../../:/app
    command: bash -lc "cd src/guildbot && npm install && npm run dev"
    env_file:
      - ../../src/guildbot/.env.compose
    depends_on:
      custody-api:
        condition: service_healthy
